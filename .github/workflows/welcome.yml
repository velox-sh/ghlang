name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Hey, thanks for opening your first issue! I will take a look soon.

            Make sure you have included the info in the template (OS, version, steps to reproduce) so I can help faster.
          pr_message: |
            Hey, thanks for your first PR! I will review it soon.

            Before pushing changes, run `uv run ruff check` and `uv run ty check` locally so CI stays green.
